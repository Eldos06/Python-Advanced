[pytest]
# при каждом запуске pytest автоматически считает покрытие и кладет html-отчет в cov-report/
addopts = --cov=./ --cov-report=html:cov-report
testpaths =
    testing
# регистрация кастомных маркеров - без этого pytest ругается PytestUnknownMarkWarning
# использование: pytest -m password_validator  (запустит только тесты с этим маркером)
markers =
    password_validator: all pwd validator tests
    web_test
    slow: all slow test

